<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RegulaAI Saúde — Auditoria Assistencial</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<div id="app" class="pl--blur-target">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">R<span>AI</span></div>
      <div class="brand-text">
        <div class="brand-title">RegulaAI</div>
        <div class="brand-sub">Saúde · Auditoria</div>
      </div>
    </div>
    <nav class="nav">
      <a data-route="dashboard" class="nav-item active" title="Dashboard"><span class="nav-ico"><i data-lucide="gauge" width="16" height="16"></i></span><span class="nav-label"> Dashboard</span></a>
      <a data-route="guias" class="nav-item" title="Guias"><span class="nav-ico"><i data-lucide="file-check-2" width="16" height="16"></i></span><span class="nav-label"> Guias</span></a>
      <a data-route="kanban" class="nav-item" title="Kanban"><span class="nav-ico"><i data-lucide="kanban" width="16" height="16"></i></span><span class="nav-label"> Kanban</span></a>
      <a data-route="param" class="nav-item" title="Parametrização"><span class="nav-ico"><i data-lucide="sliders" width="16" height="16"></i></span><span class="nav-label"> Parametrização</span></a>
      <a data-route="config" class="nav-item" title="Configurações"><span class="nav-ico"><i data-lucide="wrench" width="16" height="16"></i></span><span class="nav-label"> Configurações</span></a>
      <a data-route="logs" class="nav-item" title="Logs"><span class="nav-ico"><i data-lucide="history" width="16" height="16"></i></span><span class="nav-label"> Logs</span></a>
    </nav>
    <div class="sidebar-loader-wrap">
      <div class="loader">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <defs>
            <mask id="clipping">
              <polygon points="0,0 100,0 100,100 0,100" fill="black"></polygon>
              <polygon points="25,25 75,25 50,75" fill="white"></polygon>
              <polygon points="50,25 75,75 25,75" fill="white"></polygon>
              <polygon points="35,35 65,35 50,65" fill="white"></polygon>
              <polygon points="35,35 65,35 50,65" fill="white"></polygon>
              <polygon points="35,35 65,35 50,65" fill="white"></polygon>
              <polygon points="35,35 65,35 50,65" fill="white"></polygon>
            </mask>
          </defs>
        </svg>
        <div class="box"></div>
        <div class="loader-brand">smile<span class="loader-brand-sub">SAÚDE</span></div>
      </div>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" title="Recolher menu">
      <i data-lucide="panel-left-close" width="18" height="18"></i>
    </button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-brand">
        <div class="topbar-brand-text">
          <div class="topbar-title">
            <i data-lucide="shield-check" width="15" height="15"></i>
            RegulaAI Saúde &mdash; Auditoria Assistencial
          </div>
          <div class="topbar-breadcrumb" id="topbarBreadcrumb">
            <i data-lucide="home" width="11" height="11"></i>
            <span>Início</span>
            <span class="tbc-sep">&rsaquo;</span>
            <span class="tbc-current" id="topbarRoute">Dashboard</span>
          </div>
        </div>
      </div>
      <div class="topbar-right">
        <input id="globalSearch" type="text" style="display:none" />
<div class="topbar-user">
          <div id="userAvatar" style="display:none"></div>
<div class="topbar-user-info">
            <div class="topbar-user-name" id="userName">—</div>
            <div class="topbar-user-role" id="userRole">—</div>
          </div>
        </div>
        <div class="topbar-clock" id="topbarClock"></div>
      </div>
    </header>
    <section id="view" class="view"></section>
  </main>
</div>


<!-- FAB trocar perfil -->
<div class="fab-wrap" id="fabWrap">
  <div class="fab-orbit" id="fabMenu">
    <button class="fab-item fab-item--gestor" data-profile="gestor" data-enf-id="" data-tip="Gestor · Patrícia" style="--tx:0px;--ty:-85px;--delay:.12s">P</button>
    <button class="fab-item fab-item--auditor" data-profile="auditor" data-enf-id="" data-tip="Auditor · Dr. Marcos" style="--tx:-43px;--ty:-74px;--delay:.08s">M</button>
    <button class="fab-item fab-item--enf" data-profile="enfermeiro" data-enf-id="E1" data-tip="Renata Lopes · Enfermeiro" style="--tx:-74px;--ty:-43px;--delay:.04s">R</button>
    <button class="fab-item fab-item--enf2" data-profile="enfermeiro" data-enf-id="E2" data-tip="Carla Mendonça · Enfermeiro" style="--tx:-85px;--ty:0px;--delay:0s">C</button>
  </div>
  <button class="fab" id="fabBtn" data-tip="Simular perfil">
    <i data-lucide="users" width="18" height="18"></i>
  </button>
</div>

<div id="pageLoader" class="page-loader">
  <div class="loader" style="cursor:default">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <defs>
        <mask id="clippingPL">
          <polygon points="0,0 100,0 100,100 0,100" fill="black"></polygon>
          <polygon points="25,25 75,25 50,75" fill="white"></polygon>
          <polygon points="50,25 75,75 25,75" fill="white"></polygon>
          <polygon points="35,35 65,35 50,65" fill="white"></polygon>
          <polygon points="35,35 65,35 50,65" fill="white"></polygon>
          <polygon points="35,35 65,35 50,65" fill="white"></polygon>
          <polygon points="35,35 65,35 50,65" fill="white"></polygon>
        </mask>
      </defs>
    </svg>
    <div class="box" style="-webkit-mask:url(#clippingPL);mask:url(#clippingPL)"></div>
    <div class="loader-brand">smile<span class="loader-brand-sub">SAÚDE</span></div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot" class="toast-root"></div>

<script src="https://cdn.jsdelivr.net/npm/lucide@0.474.0/dist/umd/lucide.min.js"></script>
<script src="assets/js/mock-data.js"></script>
<script src="assets/js/solus-adapter.js"></script>
<script src="assets/js/ai-engine.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
